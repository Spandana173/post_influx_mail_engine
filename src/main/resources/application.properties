# Persistent H2 Database Configuration for Azure Linux Container Environment
spring.datasource.url=jdbc:h2:file:/home/site/wwwroot/postinflux_db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically update the database schema structure dynamically
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# ==========================================
# SECURE ENVIRONMENT MAIL ROUTING SETTINGS
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# SECURE STORAGE: Kept locally on your system out of plain source code files
spring.mail.username=postinflux@gmail.com
spring.mail.password=your-secure-app-password

# Protocol Handshake Security Configurations
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true
